<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motorola Solutions — Surveillance AI</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img class="brand-logo" src="/images/motorola-logo.png" alt="Motorola Solutions logo">
        <h1>Motorola Solutions — Surveillance AI</h1>
        <span class="badge badge-live" id="statusBadge">INITIALIZING</span>
      </div>
      <div class="header-right">
        <div class="stat-box">
          <span class="stat-label">Alerts</span>
          <span class="stat-value" id="alertCount">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">FPS</span>
          <span class="stat-value" id="fpsCounter">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Objects</span>
          <span class="stat-value" id="objectCount">0</span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Camera Feed -->
      <section class="camera-section">
        <div class="camera-container" id="cameraContainer">
          <video id="videoFeed" autoplay playsinline muted></video>
          <canvas id="overlayCanvas"></canvas>
          <div class="camera-overlay-info">
            <span id="cameraLabel">CAM-01</span>
            <span id="timestamp"></span>
          </div>
          <div class="model-loading" id="modelLoading">
            <div class="spinner"></div>
            <p>Loading AI Models...</p>
            <p class="loading-detail" id="loadingDetail">Initializing TensorFlow.js</p>
          </div>
        </div>

        <!-- Detection Controls -->
        <div class="controls-bar">
          <button class="btn btn-primary" id="btnStartStop">Start Camera</button>
          <button class="btn btn-secondary" id="btnToggleZones">Show Zones</button>
          <button class="btn btn-secondary" id="btnTogglePose">Pose Detection: OFF</button>
          <div class="threshold-control">
            <label>Confidence: <span id="thresholdValue">0.6</span></label>
            <input type="range" id="confidenceSlider" min="0.1" max="0.95" step="0.05" value="0.6">
          </div>
        </div>
      </section>

      <!-- Sidebar -->
      <aside class="sidebar">
      
        <!-- Active Detections -->
        <div class="panel">
          <h2 class="panel-title">Active Detections</h2>
          <div id="activeDetections" class="detection-list">
            <p class="placeholder-text">No detections yet</p>
          </div>
        </div>

        <!-- Alert Log -->
        <div class="panel">
          <h2 class="panel-title">
            Alert Log
            <button class="btn-icon" id="btnClearAlerts" title="Clear alerts">&#10005;</button>
          </h2>
          <div id="alertLog" class="alert-log">
            <p class="placeholder-text">No alerts triggered</p>
          </div>
        </div>

        <!-- System Stats -->
        <div class="panel">
          <h2 class="panel-title">System</h2>
          <div class="system-stats">
            <div class="sys-stat">
              <span>Model</span>
              <span id="modelStatus" class="text-yellow">Loading</span>
            </div>
            <div class="sys-stat">
              <span>Server</span>
              <span id="serverStatus" class="text-yellow">Connecting</span>
            </div>
            <div class="sys-stat">
              <span>API Endpoint</span>
              <span id="apiStatus" class="text-gray">Idle</span>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="/js/cameraManager.js"></script>
  <script src="/js/detectionEngine.js"></script>
  <script src="/js/uiManager.js"></script>
  <script src="/js/videoRecorder.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
